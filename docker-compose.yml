services:
  app:
    image: ghcr.io/rubenvitt/easy-fileshare:main
    restart: unless-stopped
    # autoheal startet den Container neu, sobald der Healthcheck unhealthy meldet.
    # Plain Docker/Compose startet unhealthy Container NICHT von selbst neu —
    # ohne dieses Label bliebe ein wedged App-Prozess (siehe /api/health) liegen.
    labels:
      - autoheal=true
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    environment:
      - DATABASE_URL=/data/db.sqlite
      - S3_ENDPOINT=http://minio:9000
    volumes:
      - db-data:/data
    healthcheck:
      # Prüft auch den Storage-Pfad: schlägt fehl, wenn der Socket-Pool erschöpft
      # ist (genau der Zustand, in dem Downloads tot sind) -> unhealthy -> autoheal.
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s
    depends_on:
      minio:
        condition: service_healthy

  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 15
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY:-minioadmin} $${S3_SECRET_KEY:-minioadmin};
      mc mb local/$${S3_BUCKET:-fileshare} --ignore-existing;
      exit 0;
      "
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-fileshare}

volumes:
  db-data:
  minio-data:
